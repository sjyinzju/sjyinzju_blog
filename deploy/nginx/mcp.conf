# =============================================================================
# MCP SSE 反向代理配置 — Nginx + Let's Encrypt
# =============================================================================
# 适用环境：Ubuntu 22.04+ / Debian 12+，Nginx ≥ 1.18
#
# 部署步骤：
#   1. 将此文件放到 /etc/nginx/sites-available/mcp.conf
#   2. 替换 <YOUR_DOMAIN> 为实际域名（如 mcp.yourdomain.com）
#   3. sudo ln -s /etc/nginx/sites-available/mcp.conf /etc/nginx/sites-enabled/
#   4. sudo nginx -t                # 检查配置语法
#   5. sudo certbot --nginx -d <YOUR_DOMAIN>   # 自动签发 SSL 证书
#   6. sudo systemctl reload nginx
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP → HTTPS 重定向（Let's Encrypt ACME 挑战除外）
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name <YOUR_DOMAIN>;

    # Let's Encrypt 证书验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS 主服务
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name <YOUR_DOMAIN>;

    # ── SSL 证书（certbot 自动写入） ──
    ssl_certificate     /etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem;

    # ── 现代 TLS 配置 ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（首次部署建议注释掉，确认无误后再打开）
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # ── 安全响应头 ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 日志 ──
    access_log /var/log/nginx/mcp_access.log;
    error_log  /var/log/nginx/mcp_error.log;

    # -----------------------------------------------------------------------
    # MCP 路径：反代到 FastAPI 后端
    # -----------------------------------------------------------------------
    #
    #   GET  /mcp/sse       → SSE 长连接（必须关闭缓冲）
    #   POST /mcp/messages  → JSON-RPC 消息
    #
    # 反代核心配置：
    #   proxy_buffering off     — SSE 是流式传输，缓冲会阻塞事件
    #   proxy_read_timeout 1d   — 长连接不超时断开
    #   proxy_http_version 1.1  — 支持分块传输 & keepalive
    #   chunked_transfer_encoding on
    # -----------------------------------------------------------------------
    location /mcp {
        # 只允许 GET（SSE）和 POST（消息），拒绝其他方法
        limit_except GET POST {
            deny all;
        }

        proxy_pass http://127.0.0.1:8000;

        # ── SSE 关键：彻底关闭代理缓冲 ──
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # ── HTTP/1.1 + 分块传输 ──
        proxy_http_version 1.1;
        chunked_transfer_encoding on;

        # ── 超时：SSE 需要极长超时 ──
        proxy_connect_timeout 60s;
        proxy_send_timeout 24h;
        proxy_read_timeout 24h;

        # ── 透传关键请求头 ──
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # ── SSE 相关：去掉 Connection / Upgrade 头干扰 ──
        proxy_set_header Connection '';
        proxy_set_header Upgrade '';

        # ── 最大请求体（MCP 消息通常很小，5 MB 足够） ──
        client_max_body_size 5m;
    }

    # -----------------------------------------------------------------------
    # 非 MCP 路径：统一返回 404（不暴露其他 API）
    # -----------------------------------------------------------------------
    location / {
        return 404;
    }
}
